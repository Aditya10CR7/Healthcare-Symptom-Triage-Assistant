services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: triage
      POSTGRES_USER: triage
      POSTGRES_PASSWORD: triage
    ports:
      - "5432:5432"
    volumes:
      - triage_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triage -d triage"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  triage_db:

