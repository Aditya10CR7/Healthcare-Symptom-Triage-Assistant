services:
  - type: web
    name: langgraph-symptom-triage-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -e ".[dev]"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: openai/gpt-oss-20b
      - key: LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: PERSIST_CASES
        value: "false"
      - key: CORS_ORIGINS
        sync: false
      - key: GROQ_API_KEY
        sync: false
